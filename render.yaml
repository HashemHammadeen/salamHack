services:
  - type: web
    name: piecemint-unified
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/mcp/status
    envVars:
      - key: MCP_API_KEY
        generateValue: true
      - key: PIECEMINT_DATABASE_URL
        value: sqlite:///./piecemint.db
      - key: FF_SMTP_HOST
        sync: false
      - key: FF_SMTP_PORT
        sync: false
      - key: FF_SMTP_USER
        sync: false
      - key: FF_SMTP_PASSWORD
        sync: false
      - key: FF_SMTP_FROM
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
