version: '3.8'

services:
  piecemint-unified:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:10000"
    environment:
      - PORT=10000
      - PIECEMINT_DATABASE_URL=sqlite:///./piecemint.db
      - MCP_API_KEY=${MCP_API_KEY:-local-dev-key}
      - FF_SMTP_HOST=${FF_SMTP_HOST}
      - FF_SMTP_PORT=${FF_SMTP_PORT}
      - FF_SMTP_USER=${FF_SMTP_USER}
      - FF_SMTP_PASSWORD=${FF_SMTP_PASSWORD}
      - FF_SMTP_FROM=${FF_SMTP_FROM}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - piecemint-data:/app/data

volumes:
  piecemint-data:
